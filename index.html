<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding 学员作品集</title>
    <style>
        :root {
            --bg: #F8F6F2;
            --card-bg: #FFFFFF;
            --text-primary: #1C1917;
            --text-secondary: #78716C;
            --border: #E7E5E4;
            --accent: #2A9D8F;
            --accent-light: #E6F4F1;
            --accent-dark: #21867A;
            --warm: #E76F51;
            --warm-light: #FDF0EC;
            --radius: 20px;
            --radius-sm: 12px;
            --shadow: 0 1px 3px rgba(28,25,23,0.04), 0 4px 16px rgba(28,25,23,0.06);
            --shadow-hover: 0 4px 12px rgba(28,25,23,0.08), 0 16px 48px rgba(28,25,23,0.10);
            --transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* ===== Header ===== */
        header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 24px 56px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 100px;
            background: var(--accent-light);
            color: var(--accent-dark);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 16px;
            color: var(--text-primary);
            line-height: 1.15;
        }

        header h1 span {
            color: var(--accent);
        }

        header p {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* ===== Gallery Grid ===== */
        .gallery {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 32px;
        }

        /* ===== Card ===== */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid var(--border);
            position: relative;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--warm));
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: #D6D3D1;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-img {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: linear-gradient(135deg, #EDEAE6 0%, #F5F3EF 50%, #EDEAE6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card-img::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.5) 50%, transparent 60%);
            animation: shimmer 2.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .card-img .placeholder-icon {
            width: 56px;
            height: 56px;
            border: 2.5px dashed #C4BFBB;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #A8A29E;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            z-index: 1;
            background: rgba(255,255,255,0.6);
        }

        .card-body {
            padding: 24px 26px 26px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 18px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .card-author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
            font-weight: 700;
            flex-shrink: 0;
        }

        .author-name {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .card-tag {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 100px;
            background: var(--accent-light);
            color: var(--accent-dark);
            font-weight: 600;
        }

        .card-tag.warm {
            background: var(--warm-light);
            color: var(--warm);
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            padding: 40px 24px 80px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        footer a {
            color: var(--accent-dark);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        footer a:hover {
            border-bottom-color: var(--accent-dark);
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            header { padding: 64px 20px 40px; }
            header h1 { font-size: 34px; }
            .gallery { grid-template-columns: 1fr; gap: 20px; padding: 0 20px 60px; }
            .card-body { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
       
        <h1>Vibe Coding 入门训练营</h1>
        <h1><span>学员作品集</span></h1>
        <p>从灵感到代码，每一个作品都承载着独特的思考与表达。</p>
    </header>

    <main class="gallery">
        <div class="card">
            <div class="card-img">
                <div class="placeholder-icon">IMG</div>
            </div>
            <div class="card-body">
                <div class="card-title">智能日程管理助手</div>
                <div class="card-desc">基于自然语言处理的智能日程安排工具，支持语音输入与多平台同步。</div>
                <div class="card-meta">
                    <div class="card-author">
                        <div class="avatar" style="background: linear-gradient(135deg, #2A9D8F, #21867A);">L</div>
                        <span class="author-name">林小北</span>
                    </div>
                    <span class="card-tag">Web 应用</span>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-img">
                <div class="placeholder-icon">IMG</div>
            </div>
            <div class="card-body">
                <div class="card-title">城市空气质量实时监测</div>
                <div class="card-desc">接入官方 API 的实时数据大屏，支持城市切换与历史趋势对比分析。</div>
                <div class="card-meta">
                    <div class="card-author">
                        <div class="avatar" style="background: linear-gradient(135deg, #E76F51, #D65A3B);">W</div>
                        <span class="author-name">王梓涵</span>
                    </div>
                    <span class="card-tag warm">数据可视化</span>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-img">
                <div class="placeholder-icon">IMG</div>
            </div>
            <div class="card-body">
                <div class="card-title">极简番茄钟 Focus Timer</div>
                <div class="card-desc">无干扰的专注计时器，白噪音背景与数据统计帮助养成高效工作习惯。</div>
                <div class="card-meta">
                    <div class="card-author">
                        <div class="avatar" style="background: linear-gradient(135deg, #E9C46A, #D4A843);">C</div>
                        <span class="author-name">陈雨桐</span>
                    </div>
                    <span class="card-tag">移动应用</span>
                </div>
            </div>
        </div>

      

     
      

        

       

       
    </main>

    <footer>
        <p>© 2026 Vibe Coding 入门训练营</p>
    </footer>

</body>
</html>
